<!--
  Template AnestReview · Recursos · Parecer (v2)
  ─────────────────────────────────────────
  EmailJS:
  - Template ID: template_recurso_parecer
  - Subject: 📋 Parecer AnestReview · Questão {{questao_numero}} ({{parecer_label}})
  - To Email: {{to_email}}

  Variáveis usadas:
    {{to_email}} {{prova_nome}} {{questao_numero}}
    {{parecer_label}} {{parecer_cor_bg}} {{parecer_cor_fg}}
    {{argumento}}            ← texto puro com \n (renderizado em pre-wrap)
    {{{bibliografia_html}}}  ← bloco HTML inteiro OU vazio (triple-brace pra renderizar HTML)
    {{{imagem_html}}}        ← bloco HTML inteiro OU vazio (triple-brace pra renderizar HTML)
    {{link_recurso}}
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Parecer AnestReview</title>
</head>
<body style="margin:0;padding:0;background:#f6f8fa;font-family:Tahoma,Geneva,Verdana,sans-serif;color:#1f2328">
  <div style="max-width:580px;margin:0 auto;padding:32px 20px;font-family:Tahoma,Geneva,Verdana,sans-serif">

    <div style="margin-bottom:22px;font-family:Tahoma,Geneva,Verdana,sans-serif">
      <div style="font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:#656d76;font-weight:700">AnestReview · Recursos</div>
      <div style="font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:24px;font-weight:700;color:#1f2328;margin-top:8px;letter-spacing:-.4px">Parecer da sua contestação</div>
    </div>

    <div style="background:#ffffff;border:1px solid #d0d7de;border-radius:14px;padding:28px;margin-bottom:18px;font-family:Tahoma,Geneva,Verdana,sans-serif">

      <div style="font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#656d76;font-weight:600;margin-bottom:6px">{{prova_nome}}</div>
      <div style="font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:20px;font-weight:700;color:#1f2328;margin-bottom:18px;letter-spacing:-.2px">Questão {{questao_numero}}</div>

      <div style="display:inline-block;padding:7px 16px;border-radius:999px;font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:12px;font-weight:700;letter-spacing:.4px;background:{{parecer_cor_bg}};color:{{parecer_cor_fg}};margin-bottom:22px;text-transform:uppercase">
        {{parecer_label}}
      </div>

      <div style="font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:14.5px;line-height:1.65;color:#1f2328;margin-bottom:18px;white-space:pre-wrap">{{argumento}}</div>

      {{{bibliografia_html}}}

      {{{imagem_html}}}

      <a href="{{link_recurso}}" style="display:inline-block;padding:12px 24px;background:#0969da;color:#ffffff;text-decoration:none;border-radius:8px;font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:14px;font-weight:700;letter-spacing:.2px">
        Ver no AnestReview →
      </a>
    </div>

  </div>
</body>
</html>
