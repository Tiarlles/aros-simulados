<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AROS</title>
<script>
// SPA fallback do GitHub Pages.
// Salva a rota original em sessionStorage e redireciona pra raiz.
// O index.html lê isso no boot e restaura a rota via history.replaceState.
(function(){
  var path = window.location.pathname + window.location.search + window.location.hash;
  if (path !== '/' && path !== '/index.html') {
    sessionStorage.setItem('aros_spa_redirect', path);
  }
  window.location.replace('/');
})();
</script>
</head>
<body>
<p>Redirecionando...</p>
</body>
</html>
